spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://thecrazyufo.in}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.thecrazyufo.in}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000          # 15 minutes (prod-secure)
    refresh-expiration-ms: 604800000 # 7 days

payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_mock_secret_key_12345}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_mock_pub_key_12345}
  paypal:
    client-id: ${PAYPAL_CLIENT_ID:mock_paypal_client_id}
    client-secret: ${PAYPAL_CLIENT_SECRET:mock_paypal_client_secret}
    mode: ${PAYPAL_MODE:live}
