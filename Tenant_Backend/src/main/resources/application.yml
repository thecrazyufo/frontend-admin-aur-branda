server:
  port: 8080

spring:
  profiles:
    active: test
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/software_platform}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml

  jackson:
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:7a3f8c2d1e6b9a4f0e5c8b2d7a1e4f9c3b6a0d8e2f5c9b4a7e1d6c3f0b8a5e2}
    expiration-ms: 86400000          # 24 hours (dev-friendly; reduce to 900000 for prod)
    refresh-expiration-ms: 604800000 # 7 days

  admin:
    username: admin
    # BCrypt hash of "admin123" - generated with BCryptPasswordEncoder strength 10
    password: "$2a$10$WvMRsusv5nfEKqvYobvmDOp9wKuI1mVaD.9hKo4GAi.6Nnu8sodeC"
  writer:
    username: writer
    # BCrypt hash of "writer123"
    password: "$2a$10$hp1V.zV.9YIgVA0VvkmxJ.pc38CF7qbi6rV9xO.NHT/U.zTK6i.Xe"

# Payment Configuration (Single-Channel)
payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_mock_secret_key_12345}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_mock_pub_key_12345}
  paypal:
    client-id: ${PAYPAL_CLIENT_ID:mock_paypal_client_id}
    client-secret: ${PAYPAL_CLIENT_SECRET:mock_paypal_client_secret}
    mode: ${PAYPAL_MODE:sandbox}
